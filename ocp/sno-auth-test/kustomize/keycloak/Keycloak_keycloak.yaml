kind: Keycloak
apiVersion: k8s.keycloak.org/v2alpha1
metadata:
  name: keycloak
spec:
  instances: 1
  hostname:
    hostname: keycloak.apps.sno-auth-testing.lab.rh-itewk.internal
  http:
    tlsSecret: keycloak-tls
  resources:
    limits:
      memory: 256Gi
    requests:
      memory: 1280Mi
  db:
    vendor: postgres
    host: postgres-db
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
  unsupported:
    podTemplate:
      spec:
        containers:
        - name: keycloak
          imagePullPolicy: IfNotPresent
