apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak
spec:
  secretName: keycloak-tls
  issuerRef:
    name: local-trusted-issuer
    kind: ClusterIssuer
  commonName: keycloak.apps.sno-auth-testing.lab.rh-itewk.internal
  dnsNames:
  - keycloak.apps.sno-auth-testing.lab.rh-itewk.internal
