---
dns-resolver:
  config:
    server:
    - 10.100.1.2
interfaces:
- name: enp0s1
  identifier: mac-address
  mac-address: AE:3F:E3:C6:A5:01
  ipv4:
    address:
    - ip: 10.100.0.100
      prefix-length: 24
    dhcp: false
    enabled: true
  ipv6:
    enabled: false
  state: up
  type: ethernet
- name: enp0s2
  identifier: mac-address
  mac-address: AE:3F:E3:C6:A5:02
  ipv4:
    address:
    - ip: 10.100.1.100
      prefix-length: 24
    dhcp: false
    enabled: true
  ipv6:
    enabled: false
  state: up
  type: ethernet
routes:
  config:
  - destination: 0.0.0.0/0
    next-hop-address: 10.100.0.1
    next-hop-interface: enp0s1
    table-id: 254
  - destination: 10.100.0.0/24
    next-hop-address: 10.100.0.1
    next-hop-interface: enp0s1
    table-id: 254
  - destination: 10.100.1.0/24
    next-hop-address: 10.100.1.1
    next-hop-interface: enp0s2
    table-id: 254
